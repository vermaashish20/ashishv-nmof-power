
<!DOCTYPE html>

    <style>
        *{

        .container{
            display:flex;
            background-color: aqua;
            flex-direction: row;
            justify-content: space-between;
            margin:0;
            
        }
        .nav{
            background-color: antiquewhite;

            width: 200px;
            margin: 0;
            z-index: 10;
        }
        .nav a{
            font-size: 30px;

            background-color: rgb(1, 7, 5);

        }
        .nav ul{
            background-color: aqua;
            height: 100%;
        }
        .nav a:hover{
            border-left: solid 10px rgb(15, 5, 44);

        }

        .main{

            width: 87%;

            padding:0px;
            height: 300px;
            width:87%;

        .explore_container_items{
            flex:30%;
            background-color: cornflowerblue;
            margin:20px;
        }
        .song_container{
            display: grid;
           grid-template-columns: 100%;
           grid-template-rows: 100px 80px 500px;
            background-color: darkblue;
            width: 87%;
            margin:0 0 0 200px;
            gap:30px 0;
        }
        .song_items{

            padding:20px;
        }
        .song_nav{
            display: flex;
            justify-content: space-evenly;
            background-color: aliceblue;
            height: 100%;
           
            
        }
        .song_button{
            background-color: blueviolet;
            border:solid 3px red;
           width: 150px;
           text-align: center;
           padding: 10px;
        }
